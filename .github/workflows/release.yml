name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0 or v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: meta
        name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create draft release (or update if it already exists)
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.meta.outputs.tag }} already exists, deleting to recreate"
            gh release delete "${{ steps.meta.outputs.tag }}" --yes
          fi
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "Orchestra v${{ steps.meta.outputs.version }}" \
            --target "${{ github.sha }}" \
            --generate-notes \
            --draft \
            ${{ steps.meta.outputs.is_prerelease == 'true' && '--prerelease' || '' }}

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            arch: arm64
          - label: macOS x64
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python setuptools (needed for node-gyp)
        run: python3 -m pip install setuptools --break-system-packages

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Rebuild native deps for Electron
        working-directory: apps/desktop
        run: npx electron-builder install-app-deps

      - name: Set version in package.json
        working-directory: apps/desktop
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.preflight.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Import code signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download Apple intermediate certificates
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          curl -sL "https://www.apple.com/appleca/AppleIncRootCertificate.cer" -o "$RUNNER_TEMP/AppleIncRootCertificate.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/AppleIncRootCertificate.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          # Import signing certificate
          security import "$CERT_PATH" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify identity
          security find-identity -v "$KEYCHAIN_PATH"
          security find-identity "$KEYCHAIN_PATH"

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          npx electron-vite build

          # Write API key to file for notarization
          if [[ -n "$APPLE_API_KEY" ]]; then
            key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY" > "$key_path"
            export APPLE_API_KEY="$key_path"
            echo "Code signing + notarization enabled."
          else
            echo "Code signing disabled."
          fi

          npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload release assets directly
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Upload binaries directly to the draft release — bypasses the
          # upload-artifact/download-artifact pipeline which corrupts large
          # binary files (adds extra bytes, breaking DMG format).
          gh release upload "${{ needs.preflight.outputs.tag }}" \
            dist/*.dmg \
            dist/*.zip \
            dist/*.blockmap \
            --clobber

      - name: Upload latest-mac.yml as artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-mac-${{ matrix.arch }}
          path: apps/desktop/dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download latest-mac.yml artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: latest-mac-*
          path: yml-files

      - name: Merge and upload latest-mac.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Each arch build produces its own latest-mac.yml with its files.
          # Merge them into a single yml with all architectures.
          python3 << 'PYEOF'
          import os, glob, re

          yml_files = sorted(glob.glob("yml-files/*/latest-mac.yml"))
          if not yml_files:
              raise SystemExit("No latest-mac.yml files found")

          if len(yml_files) == 1:
              import shutil
              shutil.copy2(yml_files[0], "latest-mac.yml")
              print(f"Single yml file: {yml_files[0]}")
              raise SystemExit(0)

          # Parse each yml: extract version, releaseDate, and file entries
          all_files = []
          version = None
          release_date = None

          for yf in yml_files:
              with open(yf) as f:
                  content = f.read()
              # Extract version
              m = re.search(r'^version:\s*(.+)$', content, re.M)
              if m:
                  version = m.group(1).strip()
              # Extract releaseDate
              m = re.search(r'^releaseDate:\s*(.+)$', content, re.M)
              if m:
                  release_date = m.group(1).strip()
              # Extract file blocks (url + sha512 + size)
              for block in re.finditer(
                  r'  - url:\s*(.+)\n\s+sha512:\s*(.+)\n\s+size:\s*(\d+)',
                  content
              ):
                  entry = {
                      'url': block.group(1).strip(),
                      'sha512': block.group(2).strip(),
                      'size': block.group(3).strip(),
                  }
                  # Deduplicate by url
                  if not any(e['url'] == entry['url'] for e in all_files):
                      all_files.append(entry)

          # Build merged yml
          lines = [f"version: {version}", "files:"]
          # Put zip files first (electron-updater prefers zip for updates)
          zips = [f for f in all_files if f['url'].endswith('.zip')]
          dmgs = [f for f in all_files if f['url'].endswith('.dmg')]
          for entry in zips + dmgs:
              lines.append(f"  - url: {entry['url']}")
              lines.append(f"    sha512: {entry['sha512']}")
              lines.append(f"    size: {entry['size']}")

          # Use first zip as the default path
          if zips:
              lines.append(f"path: {zips[0]['url']}")
              lines.append(f"sha512: {zips[0]['sha512']}")
          lines.append(f"releaseDate: {release_date}")

          with open("latest-mac.yml", "w") as f:
              f.write("\n".join(lines) + "\n")
          print(f"Merged {len(yml_files)} yml files, {len(all_files)} entries")
          PYEOF

          gh release upload "${{ needs.preflight.outputs.tag }}" \
            latest-mac.yml \
            --clobber \
            --repo "${{ github.repository }}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.preflight.outputs.tag }}" \
            --draft=false \
            --repo "${{ github.repository }}" \
            ${{ needs.preflight.outputs.make_latest == 'true' && '--latest' || '' }}
