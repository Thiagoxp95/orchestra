name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0 or v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: meta
        name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          prerelease_flag=()
          if [[ "${{ steps.meta.outputs.is_prerelease }}" == "true" ]]; then
            prerelease_flag+=(--prerelease)
          fi

          tag="${{ steps.meta.outputs.tag }}"

          # Check if a release already exists for this tag
          if release_json="$(gh api "/repos/${{ github.repository }}/releases/tags/$tag" 2>/dev/null)"; then
            is_draft=$(echo "$release_json" | jq -r '.draft')
            if [[ "$is_draft" == "false" ]]; then
              echo "Published release already exists for $tag — skipping draft creation"
              echo "Re-run the release workflow only for tags that haven't been published yet."
              exit 1
            fi
            echo "Reusing existing draft release for $tag"
            gh release edit "$tag" \
              --title "Orchestra v${{ steps.meta.outputs.version }}" \
              --target "${{ github.sha }}" \
              "${prerelease_flag[@]}"
          else
            gh release create "$tag" \
              --title "Orchestra v${{ steps.meta.outputs.version }}" \
              --target "${{ github.sha }}" \
              --generate-notes \
              --draft \
              "${prerelease_flag[@]}"
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            arch: arm64
          - label: macOS x64
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python setuptools (needed for node-gyp)
        run: python3 -m pip install setuptools --break-system-packages

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Rebuild native deps for Electron
        working-directory: apps/desktop
        run: npx electron-builder install-app-deps

      - name: Set version in package.json
        working-directory: apps/desktop
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.preflight.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Import code signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Decode certificate
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download Apple intermediate certificates
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          curl -sL "https://www.apple.com/appleca/AppleIncRootCertificate.cer" -o "$RUNNER_TEMP/AppleIncRootCertificate.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/AppleIncRootCertificate.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          # Import signing certificate
          security import "$CERT_PATH" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify identity
          security find-identity -v "$KEYCHAIN_PATH"
          security find-identity "$KEYCHAIN_PATH"

      - name: Build Electron app
        working-directory: apps/desktop
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          npx electron-vite build

          # Write API key to file for notarization
          if [[ -n "$APPLE_API_KEY" ]]; then
            key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY" > "$key_path"
            export APPLE_API_KEY="$key_path"
            echo "Code signing + notarization enabled."
          else
            echo "Code signing disabled."
          fi

          npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload release assets directly
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Upload binaries directly to the draft release — bypasses the
          # upload-artifact/download-artifact pipeline which corrupts large
          # binary files (adds extra bytes, breaking DMG format).
          gh release upload "${{ needs.preflight.outputs.tag }}" \
            dist/*.dmg \
            dist/*.zip \
            dist/*.blockmap \
            --clobber

      - name: Upload latest-mac.yml as artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-mac-${{ matrix.arch }}
          path: apps/desktop/dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Download latest-mac.yml artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: latest-mac-*
          path: yml-files

      - name: Merge latest-mac.yml from build artifacts
        run: |
          # Each arch build produces its own latest-mac.yml. Merge them while
          # preserving the full updater metadata emitted by electron-builder.
          ruby <<'RUBY'
          require "yaml"

          yml_files = Dir.glob("yml-files/*/latest-mac.yml").sort
          abort("No latest-mac.yml files found") if yml_files.empty?

          if yml_files.length == 1
            File.write("latest-mac.yml", File.read(yml_files.first))
            puts "Single yml file: #{yml_files.first}"
            exit 0
          end

          documents = yml_files.map do |path|
            data = YAML.safe_load(File.read(path), aliases: true)
            abort("Invalid YAML in #{path}") unless data.is_a?(Hash)
            [path, data]
          end

          versions = documents.map { |_, data| data["version"] }.uniq
          abort("Mismatched versions across latest-mac.yml files: #{versions.inspect}") unless versions.length == 1

          release_dates = documents.map { |_, data| data["releaseDate"] }.compact.sort
          latest_release_date = release_dates.last

          merged = documents.first[1].dup
          merged_files_by_url = {}

          documents.each do |path, data|
            files = Array(data["files"])
            abort("No files provided in #{path}") if files.empty?

            dir_arch = File.basename(File.dirname(path)).sub("latest-mac-", "")

            files.each do |entry|
              abort("Invalid file entry in #{path}: #{entry.inspect}") unless entry.is_a?(Hash) && entry["url"]
              url = entry["url"].to_s
              next unless url.include?(dir_arch)
              merged_files_by_url[url] ||= entry
            end
          end

          merged_files = merged_files_by_url.values
          preferred_file = merged_files.find { |entry| entry["url"].to_s.end_with?(".zip") } || merged_files.first
          abort("No merged files found for latest-mac.yml") unless preferred_file

          merged["files"] = merged_files
          merged["path"] = preferred_file["url"]
          merged["sha512"] = preferred_file["sha512"] if preferred_file["sha512"]
          merged["releaseDate"] = latest_release_date if latest_release_date

          if preferred_file.key?("size")
            merged["size"] = preferred_file["size"]
          else
            merged.delete("size")
          end

          File.write("latest-mac.yml", YAML.dump(merged))
          puts "Merged #{documents.length} yml files, #{merged_files.length} entries"
          RUBY

      - name: Reconcile checksums from uploaded assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          # gh release upload can silently alter file bytes (observed on arm64
          # artifacts). Download every asset listed in latest-mac.yml from the
          # release via the API (draft releases aren't publicly accessible),
          # recompute sha512 + size, and patch the yml so it matches what
          # electron-updater will actually download.

          # Download assets via gh api (works for draft releases, unlike public URLs)
          gh release download "$RELEASE_TAG" \
            --repo "$RELEASE_REPO" \
            --dir "$RUNNER_TEMP/release-assets" \
            --pattern '*.zip' --pattern '*.dmg'

          ruby <<'RUBY'
          require "digest"
          require "yaml"

          data = YAML.safe_load(File.read("latest-mac.yml"), aliases: true)
          abort("Invalid latest-mac.yml") unless data.is_a?(Hash)

          files = Array(data["files"])
          abort("No files in latest-mac.yml") if files.empty?

          asset_dir = File.join(ENV.fetch("RUNNER_TEMP", "/tmp"), "release-assets")
          patched = 0

          files.each do |entry|
            url = entry["url"].to_s
            next if url.empty?

            local_path = File.join(asset_dir, url)
            unless File.exist?(local_path)
              puts "  SKIP #{url} (not downloaded)"
              next
            end

            bytes = File.binread(local_path)
            actual_size = bytes.bytesize
            actual_sha512 = [Digest::SHA512.digest(bytes)].pack("m0")

            if entry["size"].to_i != actual_size || entry["sha512"] != actual_sha512
              puts "  PATCHING #{url}: size #{entry['size']}->#{actual_size}"
              entry["size"] = actual_size
              entry["sha512"] = actual_sha512
              patched += 1
            else
              puts "  OK #{url}"
            end
          end

          # Update top-level path/sha512/size to match the preferred zip
          preferred = files.find { |e| e["url"].to_s == data["path"] } || files.first
          data["path"]   = preferred["url"]
          data["sha512"]  = preferred["sha512"]
          data["size"]    = preferred["size"]

          File.write("latest-mac.yml", YAML.dump(data))
          puts "Patched #{patched} entries"
          RUBY

      - name: Upload latest-mac.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.preflight.outputs.tag }}" \
            latest-mac.yml \
            --clobber \
            --repo "${{ github.repository }}"

      - name: Validate published updater metadata
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          # Re-download zips via gh (works for draft releases) and verify
          # against the reconciled latest-mac.yml
          gh release download "$RELEASE_TAG" \
            --repo "$RELEASE_REPO" \
            --dir "$RUNNER_TEMP/validate-assets" \
            --pattern '*.zip'

          mapfile -t zip_files < <(ruby -ryaml -e '
            data = YAML.safe_load(File.read("latest-mac.yml"), aliases: true)
            Array(data["files"]).each do |entry|
              next unless entry.is_a?(Hash)
              url = entry["url"].to_s
              puts url if url.end_with?(".zip")
            end
          ')

          if [[ ${#zip_files[@]} -eq 0 ]]; then
            echo "No ZIP assets found in latest-mac.yml" >&2
            exit 1
          fi

          for zip_file in "${zip_files[@]}"; do
            asset_path="$RUNNER_TEMP/validate-assets/$zip_file"
            ruby apps/desktop/scripts/verify-latest-mac.rb --yaml latest-mac.yml --asset "$asset_path" --url "$zip_file"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.preflight.outputs.tag }}" \
            --draft=false \
            --repo "${{ github.repository }}" \
            ${{ needs.preflight.outputs.make_latest == 'true' && '--latest' || '' }}
